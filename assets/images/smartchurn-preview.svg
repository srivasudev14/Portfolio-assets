<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg1)" rx="12"/>
  <!-- Grid lines -->
  <line x1="80" y1="240" x2="540" y2="240" stroke="#334155" stroke-width="1"/>
  <line x1="80" y1="200" x2="540" y2="200" stroke="#1e293b" stroke-width="1" stroke-dasharray="4"/>
  <line x1="80" y1="160" x2="540" y2="160" stroke="#1e293b" stroke-width="1" stroke-dasharray="4"/>
  <line x1="80" y1="120" x2="540" y2="120" stroke="#1e293b" stroke-width="1" stroke-dasharray="4"/>
  <line x1="80" y1="80" x2="540" y2="80" stroke="#1e293b" stroke-width="1" stroke-dasharray="4"/>
  <!-- Bar chart -->
  <rect x="100" y="140" width="40" height="100" fill="#8cb4ff" rx="4" opacity="0.9"/>
  <rect x="160" y="100" width="40" height="140" fill="#8cb4ff" rx="4" opacity="0.75"/>
  <rect x="220" y="160" width="40" height="80" fill="#8cb4ff" rx="4" opacity="0.85"/>
  <rect x="280" y="80" width="40" height="160" fill="#60a5fa" rx="4" opacity="0.9"/>
  <rect x="340" y="120" width="40" height="120" fill="#8cb4ff" rx="4" opacity="0.8"/>
  <rect x="400" y="170" width="40" height="70" fill="#f97316" rx="4" opacity="0.85"/>
  <rect x="460" y="190" width="40" height="50" fill="#f97316" rx="4" opacity="0.7"/>
  <!-- Trend line -->
  <polyline points="120,130 180,90 240,150 300,70 360,110 420,160 480,180" fill="none" stroke="#facc15" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Labels -->
  <text x="300" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#fff">SmartChurn</text>
  <text x="300" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="12" fill="#94a3b8">Credit Card Attrition Prediction</text>
  <!-- Legend -->
  <rect x="380" y="25" width="12" height="12" fill="#8cb4ff" rx="2"/>
  <text x="398" y="36" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Active</text>
  <rect x="440" y="25" width="12" height="12" fill="#f97316" rx="2"/>
  <text x="458" y="36" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Attrited</text>
  <!-- Accuracy badge -->
  <rect x="440" y="260" width="90" height="24" rx="12" fill="#22c55e" opacity="0.15"/>
  <text x="485" y="277" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="11" fill="#4ade80">96% Accuracy</text>
</svg>
