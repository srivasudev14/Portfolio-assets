<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a0a"/>
      <stop offset="100%" style="stop-color:#1e1028"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg2)" rx="12"/>
  <!-- ECG / Heartbeat line -->
  <polyline points="0,180 60,180 80,180 95,180 105,120 115,220 125,100 135,240 145,160 155,180 200,180 250,180 270,180 285,120 295,220 305,100 315,240 325,160 335,180 400,180 450,180 470,180 485,120 495,220 505,100 515,240 525,160 535,180 600,180" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.7"/>
  <!-- Heart icon -->
  <g transform="translate(260, 50)">
    <path d="M40,15 C40,5 50,0 55,0 C65,0 75,10 75,20 C75,40 40,65 40,65 C40,65 5,40 5,20 C5,10 15,0 25,0 C30,0 40,5 40,15Z" fill="#ef4444" opacity="0.8"/>
  </g>
  <!-- Labels -->
  <text x="300" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="22" fill="#fff">HeartBeacon</text>
  <text x="300" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="12" fill="#a78bfa">Cardiovascular Disease Prediction Model</text>
  <!-- Stats -->
  <g transform="translate(100, 220)">
    <rect width="100" height="50" rx="8" fill="#1e1e3a" stroke="#312e81" stroke-width="1"/>
    <text x="50" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="16" fill="#ef4444">90%</text>
    <text x="50" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="10" fill="#94a3b8">Accuracy</text>
  </g>
  <g transform="translate(250, 220)">
    <rect width="100" height="50" rx="8" fill="#1e1e3a" stroke="#312e81" stroke-width="1"/>
    <text x="50" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="16" fill="#a78bfa">319K</text>
    <text x="50" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="10" fill="#94a3b8">Records</text>
  </g>
  <g transform="translate(400, 220)">
    <rect width="100" height="50" rx="8" fill="#1e1e3a" stroke="#312e81" stroke-width="1"/>
    <text x="50" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="16" fill="#60a5fa">SMOTE</text>
    <text x="50" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="10" fill="#94a3b8">Balanced</text>
  </g>
</svg>
